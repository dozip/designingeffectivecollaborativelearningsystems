# =============================================================================
# README
# =============================================================================
#
# This config file now supports multiple experiment configurations.
#
# The base configuration is defined in the normal sections:
#
#   sim:
#   market:
#   supply_chain:
#
# At the bottom of the file, the experiments section defines which configurations
# should be executed.
#
# Important idea:
#
#   simulation_runs = repeated runs of the same configuration
#   experiments      = different configurations/scenarios
#
# In this file, there is only one experiment:
#
#   original_config
#
# It has:
#
#   overrides: {}
#
# This means it does not change anything from the base configuration.
# Therefore, this YAML behaves exactly like the original version.
#
# Example:
#
#   sim:
#     simulation_runs: 1
#
# means:
#
#   Run original_config once.
#
# If you change it to:
#
#   sim:
#     simulation_runs: 5
#
# then it means:
#
#   Run original_config five times.
#
# To add another experiment later, add another item under experiments:
#
#   experiments:
#     - name: original_config
#       overrides: {}
#
#     - name: split_multichannel_config
#       overrides:
#         sim:
#           training_type: "split_multichannel"
#
# Then the program will run both configurations.
#
# =============================================================================


sim:
  simulation_runs: 1
  convergence_time: 2500 # define the warm up phase
  simulation_time: 2500 # define time steps to simulate after warm up until training
  training_time: 500 # considered time steps for training of the models
  testing_time: 50 # timesteps after training for testing
  training_type: "TimesFM_zero_shot" # options: null, local_multichannel, split_multichannel, Chronos_zero_shot, TimesFM_zero_shot
  train_size: 400
  val_size: 50
  epochs: 3000
  learning_rate: 0.001
  momentum: 0.9
  batch_size: 32
  sequence_length: 4

market:
  data_scource: # if empty/null, market configuration is used
  primary_demand: 1000
  trend_magnitude: 2
  seasonality_magnitude: 5
  seasonality_frequncy: 7
  random_walk:
    mean: 10
    variance: 1
  demand_split: [0.8, 0.2]

supply_chain:
  agents_per_level: [2, 3]

  sc_levels:
    sc_level_0:
      adjaceny_list: [[1, 1, 1], [1, 1, 1]]
      lead_time: 1
      replenishment_strat: ["OUT", "OUT"]
      forecasting_strat: ["MA", "MA"]
      inv_capacity: [50000, 50000]
      init_inv: [0, 0]
      safety_risk_factor: [1, 1]
      R: [1, 1]

    sc_level_1:
      adjaceny_list: [[1], [1], [1]]
      lead_time: 1
      replenishment_strat: ["OUT", "OUT", "OUT"]
      forecasting_strat: ["MA", "MA", "MA"]
      inv_capacity: [10000, 100000, 10000]
      init_inv: [0, 0, 0]
      safety_risk_factor: [1, 1, 1]
      R: [1, 1, 1]


# =============================================================================
# EXPERIMENT DEFINITIONS
# =============================================================================
#
# Each item in this list is one configuration that will be executed.
#
# This first experiment uses the base configuration exactly as defined above.
# Since overrides is empty, no values are changed.
#
# =============================================================================

experiments:
  - name: no_training_ma
    overrides:
      sim:
        training_type: null

  - name: local_multichannel
    overrides:
      sim:
        training_type: "local_multichannel"

  - name: split_multichannel
    overrides:
      sim:
        training_type: "split_multichannel"

  - name: chronos_zero_shot
    overrides:
      sim:
        training_type: "Chronos_zero_shot"

  - name: timesfm_zero_shot
    overrides:
      sim:
        training_type: "TimesFM_zero_shot"