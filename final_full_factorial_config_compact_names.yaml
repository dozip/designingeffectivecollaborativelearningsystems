# =============================================================================
# README
# =============================================================================
#
# This config file supports multiple experiment configurations.
#
# The base configuration is defined in the normal sections:
#
#   sim:
#   market:
#   supply_chain:
#
# The experiments section at the bottom defines which configurations are executed.
#
# Important idea:
#
#   simulation_runs = repeated runs of the same configuration
#   experiments      = different configurations/scenarios
#
# This file contains a full factorial experiment grid:
#
#   7 training types
#   3 seasonality frequencies: 7, 15, 30
#   3 noise levels: 0, 10, 100
#   3 lead times: 1, 2, 3
#
# Total:
#
#   7 * 3 * 3 * 3 = 189 experiments
#
# Experiment names intentionally do not include parameter values because the
# experiment name is used for folder creation. The parameter values are stored
# only in the overrides. For CLI/dashboard rendering and run IDs, derive:
#
#   training_type           from sim.training_type
#   seasonality_frequncy    from market.seasonality_frequncy
#   noise                   from market.random_walk.variance
#   lead_time               from supply_chain.sc_levels.*.lead_time
#
# =============================================================================


sim:
  simulation_runs: 5
  run_start_id: 5
  convergence_time: 2500 # define the warm up phase
  simulation_time: 2500 # define time steps to simulate after warm up until training
  training_time: 500 # considered time steps for training of the models
  testing_time: 50 # timesteps after training for testing
  training_type: "TimesFM_zero_shot" # options: null, local_multichannel, split_multichannel, Chronos_zero_shot, TimesFM_zero_shot, local_timemixer, split_timemixer
  train_size: 1000
  val_size: 50
  epochs: 3000
  learning_rate: 0.001
  momentum: 0.9
  batch_size: 32
  sequence_length: 14

early_stopping:
  patience: 200
  min_delta: 0.0
  
market:
  data_scource: # if empty/null, market configuration is used
  primary_demand: 1000
  trend_magnitude: 2
  seasonality_magnitude: 5
  seasonality_frequncy: 7
  random_walk:
    mean: 10
    variance: 1
  demand_split: [0.8, 0.2]

supply_chain:
  agents_per_level: [2, 3]

  sc_levels:
    sc_level_0:
      adjaceny_list: [[1, 1, 1], [1, 1, 1]]
      lead_time: 1
      replenishment_strat: ["OUT", "OUT"]
      forecasting_strat: ["MA", "MA"]
      inv_capacity: [50000, 50000]
      init_inv: [0, 0]
      safety_risk_factor: [1, 1]
      R: [1, 1]

    sc_level_1:
      adjaceny_list: [[1], [1], [1]]
      lead_time: 1
      replenishment_strat: ["OUT", "OUT", "OUT"]
      forecasting_strat: ["MA", "MA", "MA"]
      inv_capacity: [10000, 100000, 10000]
      init_inv: [0, 0, 0]
      safety_risk_factor: [1, 1, 1]
      R: [1, 1, 1]


# =============================================================================
# EXPERIMENT DEFINITIONS
# =============================================================================
#
# Compact name format:
#
#   <training_name>_<number>
#
# Example:
#
#   timesfm_zero_shot_014
#
# The corresponding seasonality frequency, noise, and lead time are defined
# inside overrides and should be displayed in the CLI/dashboard by reading the
# resolved configuration.
#
# =============================================================================

